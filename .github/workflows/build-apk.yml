name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Android APK (via PWABuilder API)
        uses: jonasmerlin/pwa-builder-action@v1
        with:
          # Your PWA URL
          url: https://beginth.github.io/bp-pressure-app/
          # Name of the output artifact
          output: bpressure-apk.zip
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpressure-apk
          path: bpressure-apk.zip
