name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare Android SDK
        run: |
          echo "ANDROID_HOME = $ANDROID_HOME"
          echo "JAVA_HOME = $JAVA_HOME"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install Bubblewrap globally
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          echo "Config written:"
          cat ~/.bubblewrap/config.json

      - name: Create Keystore
        run: |
          keytool -genkey -v -keystore android.keystore -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass password -keypass password \
            -dname "CN=BPressure, OU=Health, O=BeginTH, L=Bangkok, S=Bangkok, C=TH"

      - name: Initialize TWA Project
        run: bubblewrap init --manifest https://beginth.github.io/bp-pressure-app/manifest.json --extracert --yes

      - name: Build APK
        run: bubblewrap build --signingKeyPath ./android.keystore --signingKeyPassword password --signingKeyAlias android --skipCheck

      - name: List APK files
        run: |
          echo "Looking for APK files..."
          find . -name "*.apk" -type f
          ls -la *.apk 2>/dev/null || echo "No APK in root"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpressure-apk
          path: |
            ./*.apk
            ./app/build/outputs/apk/**/*.apk
