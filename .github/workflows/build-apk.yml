name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and Package APK
        uses: florentmuller/pwa-to-apk@v1.0
        with:
          # The URL of your PWA
          url: https://beginth.github.io/bp-pressure-app/
          # Android package ID
          package_id: com.beginth.bpressure
          # App name
          app_name: BPressure AI
          # Icon URL
          icon_url: https://beginth.github.io/bp-pressure-app/icons/icon-512.png
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bpressure-apk
          path: ./*.apk
